name = "author-fatima-76r"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages Configuration
pages_build_output_dir = "dist"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================

[vars]
ENVIRONMENT = "development"
BACKEND_URL = "http://localhost:3001"
FRONTEND_URL = "http://localhost:5173"

# ============================================================================
# PRODUCTION ENVIRONMENT
# ============================================================================

[env.production]
name = "author-fatima-prod"

[env.production.vars]
ENVIRONMENT = "production"
BACKEND_URL = "https://writer-website-landing-page-1.vercel.app"
FRONTEND_URL = "https://main.author-fatima-76r-eis.pages.dev"

# Turso Database Credentials (set via Cloudflare Dashboard Secrets)
# Settings → Production → Secrets
